<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta - soop MAIL</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-box">
            <div class="login-header">
                <h1><i class="fas fa-user-plus"></i> soop MAIL</h1>
                <p>Crear cuenta de administrador</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="alert {{ category }}">
                            <i class="fas fa-{% if category == 'error' %}exclamation-circle{% elif category == 'success' %}check-circle{% else %}info-circle{% endif %}"></i>
                            {{ message }}
                        </div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form id="registerForm" method="POST">
                <div class="form-group">
                    <label for="username">
                        <i class="fas fa-user"></i> Usuario
                    </label>
                    <input type="text" id="username" name="username" class="form-control" required autofocus placeholder="Nombre de usuario">
                </div>

                <div class="form-group">
                    <label for="email">
                        <i class="fas fa-envelope"></i> Email
                    </label>
                    <input type="email" id="email" name="email" class="form-control" required placeholder="email@ejemplo.com">
                </div>

                <div class="form-group">
                    <label for="full_name">
                        <i class="fas fa-id-card"></i> Nombre completo
                    </label>
                    <input type="text" id="full_name" name="full_name" class="form-control" placeholder="Tu nombre completo">
                </div>

                <div class="form-group">
                    <label for="password">
                        <i class="fas fa-lock"></i> Contraseña
                    </label>
                    <input type="password" id="password" name="password" class="form-control" required placeholder="Contraseña segura (mínimo 8 caracteres)">
                </div>

                <div class="form-group">
                    <label for="password_confirm">
                        <i class="fas fa-lock"></i> Confirmar contraseña
                    </label>
                    <input type="password" id="password_confirm" name="password_confirm" class="form-control" required placeholder="Repite la contraseña">
                </div>

                <button type="submit" class="btn btn--primary btn-register">
                    <i class="fas fa-user-plus"></i>
                    Crear cuenta
                </button>
            </form>

            <div class="login-link">
                <p>¿Ya tienes cuenta?</p>
                <a href="{{ url_for('login') }}">Iniciar sesión</a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const formData = new FormData(this);
            const data = {
                username: formData.get('username'),
                email: formData.get('email'),
                full_name: formData.get('full_name'),
                password: formData.get('password'),
                password_confirm: formData.get('password_confirm')
            };

            try {
                const response = await fetch('/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(data)
                });

                const result = await response.json();

                if (result.success) {
                    window.location.href = '/';
                } else {
                    showAlert('error', result.error || 'Error al crear la cuenta');
                }
            } catch (error) {
                this.submit();
            }
        });

        function showAlert(type, message) {
            const alert = document.createElement('div');
            alert.className = `alert ${type}`;
            alert.innerHTML = `
                <i class="fas fa-${type === 'error' ? 'exclamation-circle' : 'info-circle'}"></i>
                ${message}
            `;
            
            const form = document.getElementById('registerForm');
            form.parentNode.insertBefore(alert, form);
            
            setTimeout(() => {
                alert.remove();
            }, 5000);
        }
    </script>
</body>
</html>
